<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todoアプリ</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ログイン画面 -->
  <div id="auth-container" class="container">
    <h1>Todoアプリ</h1>
    <p id="auth-message"></p>
    <input type="email" id="auth-email" placeholder="メールアドレス" />
    <input type="password" id="auth-password" placeholder="パスワード（6文字以上）" />
    <div class="auth-btn-area">
      <button id="login-btn">ログイン</button>
      <button id="signup-btn">新規登録</button>
    </div>
  </div>

  <!-- アプリ本体（ログイン後表示） -->
  <div id="app-container" class="container" style="display:none">
    <div class="app-header">
      <h1>Todoアプリ</h1>
      <button id="logout-btn">ログアウト</button>
    </div>

    <!-- タスク入力エリア -->
    <div class="input-area">
      <div class="input-row">
        <input
          type="text"
          id="todo-input"
          placeholder="タスクを入力してください"
          maxlength="100"
        />
        <button id="add-btn">追加</button>
      </div>
      <div class="deadline-row">
        <label for="todo-deadline">期限日</label>
        <input type="date" id="todo-deadline" />
      </div>
      <textarea id="todo-note" placeholder="備考（任意）"></textarea>
    </div>

    <!-- フィルターボタンエリア -->
    <div class="filter-area">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="completed">完了済み</button>
    </div>

    <!-- タスク一覧 -->
    <ul id="todo-list"></ul>

    <!-- タスクが0件のときに表示するメッセージ -->
    <p id="empty-message" class="empty-message">タスクがありません</p>

    <!-- フッター -->
    <div class="footer">
      <span id="remaining-count">残り 0 件</span>
      <button id="clear-completed-btn">完了済みを削除</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
